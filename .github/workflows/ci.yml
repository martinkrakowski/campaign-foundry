name: CI

# Generated by the hexagen ci-github-actions template. Commands target yarn
# (the package manager the generator and its templates use); npm/pnpm users
# should adjust the install/run commands (e.g. `npm ci`, `npm run <script>`).
# Choices recorded at install time:
#   triggers:        push-all-branches,pull-request,push-main-only
#   run tests:       true
#   cache strategy:  turbo-cache
#   deploy target:   none
#   preview deploys: true
#   docker image:    false
#
# The `on:` block below covers every branch push + PRs to main. Narrow it to
# match your triggers — e.g. push-main-only -> `branches: [main]`, or drop the
# `push:` key entirely to run on pull_request only.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One in-flight CI run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Typecheck, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # No package-manager cache here — actions/setup-node's cache requires a
          # committed lockfile and fails without one. The Turbo cache below covers
          # task outputs; re-enable the setup-node cache once you commit yarn.lock.

      # Corepack activates the package manager pinned in package.json
      # (`packageManager`). Without it, the runner's default Yarn (Classic)
      # can't honor a Yarn-4 project. See SETUP.md.
      - name: Enable Corepack
        run: corepack enable

      # Read the pinned version from package.json's `packageManager` at runtime
      # so CI can never drift from what the project declares (no baked version).
      - name: Prepare package manager
        run: |
          corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate

      # yarn.lock is committed, so install is immutable: CI fails on a stale
      # lockfile instead of silently rewriting it. This also protects the
      # sync --check step below — its clean-tree preflight would otherwise
      # trip on an install-mutated lockfile and mask the real drift signal.
      - name: Install dependencies
        run: "yarn install --immutable"

      # Hexagen architecture gates (require >=0.7.0 — earlier CLIs exited 0 on
      # every failure mode, so gating was vacuous; see .agents/session-log.md,
      # 2026-06-09 entry). `sync --check` is read-only and exits 1 iff the
      # committed tree drifted from what .architecture/manifest.yaml generates;
      # `arch validate` enforces the layer/import rules. Both are sub-second,
      # hence ahead of the build for fail-fast.
      - name: Architecture drift gate (hexagen sync --check)
        run: "yarn sync:check"

      - name: Architecture lint (hexagen arch validate)
        run: "yarn lint:arch"

      # Turbo caches task outputs keyed by input hash, so unchanged packages are
      # skipped on warm runs (cache_strategy = turbo-cache). Set TURBO_TOKEN
      # and TURBO_TEAM below for the cross-run remote cache.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # `check:env` is provided by the env-setup template. Resilient by design:
      # runs only if the script exists, so CI stays green whether or not
      # env-setup is installed (Item 3 will emit this step conditionally).
      - name: Validate env vars
        run: |
          if node -e "try { process.exit(require('./package.json').scripts?.['check:env'] ? 0 : 1) } catch { process.exit(1) }"; then
            yarn check:env
          else
            echo "no check:env script — skipping (env-setup not installed or package.json unreadable)"
          fi
        env:
          NODE_ENV: test

      - name: Build
        run: "yarn build"
        env:
          # TODO: add TURBO_TOKEN (secret) and TURBO_TEAM (variable) for the
          # remote Turbo cache. Safe to omit — the build just won't share cache.
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Typecheck
        run: "yarn typecheck"

      - name: Lint
        run: "yarn lint"

      # run_tests = true; delete this step to skip tests in CI.
      # test:cov enforces the 100% coverage gate (vitest.config.ts thresholds).
      - name: Test
        run: "yarn test:cov"
        env:
          NODE_ENV: test

      # Tests live in __tests__/ next to their modules, but Nitro scans apps/api/server/
      # recursively. A *.test.ts file landing there gets registered as a route and crashes
      # `yarn dev` at boot — a runtime fault the build and coverage gate don't catch. Fail
      # the build if the Nitro route manifest ever references a test file.
      - name: Guard the API route scan against test files
        run: |
          MANIFEST="apps/api/.nitro/types/nitro-routes.d.ts"
          yarn workspace @campaignfoundry/api exec nitro prepare
          # Fail closed: a missing manifest means the guard can't validate anything.
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Nitro route manifest not found at $MANIFEST"
            exit 1
          fi
          # `\.test\b` is robust to Nitro's quoting/extension (matches .test', .test.ts, .test/, …).
          if grep -Eq '__tests__|\.test\b' "$MANIFEST"; then
            echo "::error::A test file was scanned as a Nitro route. Keep tests out of the server scan (see apps/api/nitro.config.ts \`ignore\`)."
            exit 1
          fi
          echo "Nitro route manifest is free of test files."
