# Flagship demo brief (YAML) — Summer Hydration. The pipeline generates a creative
# for every product × aspect ratio; with no `treatments` block it renders a single
# default treatment per slot. Backgrounds are generated by the selected image model
# (Auto runs Imagen → OpenRouter → procedural, each tier key-gated); the brand colour
# drives the accent band and brand-compliance scoring, and the logo is composited on top.
id: summer-hydration-2026
targetRegion: DE
targetAudience: Urban outdoor enthusiasts, 25-40
campaignMessage: Stay wild. Stay hydrated.
localizedMessage: Bleib wild. Bleib hydriert.
products:
  - id: hydra-bottle
    name: Hydra Bottle
    primaryColor: "#1473E6"
    logoPath: assets/inputs/hydra-logo.png
  - id: trail-pack
    name: Trail Pack
    primaryColor: "#E0218A"
    logoPath: assets/inputs/trail-logo.png
