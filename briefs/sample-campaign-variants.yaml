# Variants demo brief — Urban Commute, requesting two creative treatments. The pipeline
# produces product × ratio × treatment, so the HITL grid shows each ratio slot with both
# treatments (bold-bottom and subtle-top) side-by-side. Use this to demo the variation matrix.
id: urban-commute-2026
targetRegion: GB
targetAudience: City commuters & students, 22-38
campaignMessage: Move through the city.
localizedMessage: Move through the city.
products:
  - id: city-backpack
    name: City Backpack
    primaryColor: "#6C5CE7"
    logoPath: assets/inputs/city-logo.png
  - id: metro-flask
    name: Metro Flask
    primaryColor: "#00B894"
    logoPath: assets/inputs/metro-logo.png
treatments:
  - id: bold-bottom
    layout: headline-bottom
    tone: bold
  - id: subtle-top
    layout: headline-top
    tone: subtle
