# Orange campaign variation — generates hero imagery with the selected image model
# (or the default fallback chain), with orange as the brand accent. No `inputAsset`,
# so the pipeline falls through reuse → Imagen → OpenRouter → procedural; the brand
# colour drives the accent band and brand-compliance scoring, and the logo is
# composited on top. Use this to demo the model selector with an orange campaign.
id: summer-hydration-2026-orange
targetRegion: DE
targetAudience: Urban outdoor enthusiasts, 25-40
campaignMessage: Stay wild. Stay hydrated.
localizedMessage: Bleib wild. Bleib hydriert.
products:
  - id: acme-hydra-bottle
    name: Hydra Bottle
    primaryColor: "#FF7A00"
    logoPath: assets/inputs/hydra-logo.png
    # no inputAsset — pipeline generates imagery, orange accent band applied
  - id: acme-trail-pack
    name: Trail Pack
    primaryColor: "#FF7A00"
    logoPath: assets/inputs/trail-logo.png
    # no inputAsset — pipeline generates imagery, orange accent band applied
treatments:
  - id: bold-bottom
    layout: headline-bottom
    tone: bold
  - id: subtle-top
    layout: headline-top
    tone: subtle
