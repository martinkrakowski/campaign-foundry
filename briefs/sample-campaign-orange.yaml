# Orange campaign variation, with orange as the brand accent. No `inputAsset`, so
# backgrounds are generated (never reused) by the selected image model — the chain is
# conditional: Auto runs Imagen → OpenRouter → procedural with each tier key-gated;
# selecting an OpenRouter model uses it → procedural; with no keys it's procedural.
# The brand colour drives the accent band and brand-compliance scoring, and the logo
# is composited on top. Use this to demo the model selector with an orange campaign.
id: summer-hydration-2026-orange
targetRegion: DE
targetAudience: Urban outdoor enthusiasts, 25-40
campaignMessage: Stay wild. Stay hydrated.
localizedMessage: Bleib wild. Bleib hydriert.
products:
  - id: acme-hydra-bottle
    name: Hydra Bottle
    primaryColor: "#FF7A00"
    logoPath: assets/inputs/hydra-logo-orange.png
    # no inputAsset — pipeline generates imagery, orange accent band applied
  - id: acme-trail-pack
    name: Trail Pack
    primaryColor: "#FF7A00"
    logoPath: assets/inputs/trail-logo-orange.png
    # no inputAsset — pipeline generates imagery, orange accent band applied
treatments:
  - id: bold-bottom
    layout: headline-bottom
    tone: bold
  - id: subtle-top
    layout: headline-top
    tone: subtle
